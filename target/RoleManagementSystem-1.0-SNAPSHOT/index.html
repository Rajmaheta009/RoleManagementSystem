<!DOCTYPE html>

<html lang="en">

    <head>

        <meta charset="UTF-8">

        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">

        <title>Role Management System</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              rel="stylesheet">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
              rel="stylesheet">

        <link rel="stylesheet"
              href="css/style.css">

    </head>

    <body class="bg-light">

        <div class="container">

            <div class="row justify-content-center align-items-center vh-100">

                <div class="col-lg-8">

                    <div class="card shadow-lg border-0">

                        <div class="card-body text-center p-5">

                            <i class="bi bi-shield-lock-fill display-1 text-primary"></i>

                            <h1 class="fw-bold mt-3">

                                Role Management System

                            </h1>

                            <p class="lead text-muted mt-3">

                                A secure Role-Based User Management System built using
                                <strong>Jakarta EE, JSP, Servlets, PostgreSQL and Bootstrap 5.</strong>

                            </p>

                            <hr class="my-4">

                            <div class="row text-center mb-4">

                                <div class="col-md-4">

                                    <i class="bi bi-people-fill display-6 text-primary"></i>

                                    <h5 class="mt-2">

                                        User Management

                                    </h5>

                                </div>

                                <div class="col-md-4">

                                    <i class="bi bi-person-badge-fill display-6 text-success"></i>

                                    <h5 class="mt-2">

                                        Role Management

                                    </h5>

                                </div>

                                <div class="col-md-4">

                                    <i class="bi bi-shield-check display-6 text-danger"></i>

                                    <h5 class="mt-2">

                                        Secure Access

                                    </h5>

                                </div>

                            </div>

                            <div class="d-grid gap-3 d-md-flex justify-content-md-center">

                                <a href="login.jsp"
                                   class="btn btn-primary btn-lg px-5">

                                    <i class="bi bi-box-arrow-in-right"></i>

                                    Login

                                </a>

                                <a href="register.jsp"
                                   class="btn btn-success btn-lg px-5">

                                    <i class="bi bi-person-plus-fill"></i>

                                    Register

                                </a>

                            </div>

                        </div>

                    </div>

                    <p class="text-center text-muted mt-4">

                        © 2026 Role Management System

                    </p>

                </div>

            </div>

        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    </body>

</html>
